<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test</title>
  <link rel="stylesheet" href="src/styles/main.css" />
  <style>
    #test1 { opacity: 0; visibility: hidden; transform: translateY(40px); transition: opacity 1s, transform 1s; }
  </style>
</head>
<body>
  <h1>Visible heading</h1>
  <section id="test1">
    <h2>This should be hidden</h2>
    <p>If you see this, the style isn't working.</p>
  </section>
  <script>
    setTimeout(function() {
      var el = document.getElementById("test1");
      el.style.setProperty("opacity", "1", "important");
      el.style.setProperty("visibility", "visible", "important");
      el.style.setProperty("transform", "translateY(0)", "important");
    }, 2000);
  </script>
</body>
</html>
